<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Potuzhno Browser — New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #1a5fa8;
      --blue-light: #5b9bd5;
      --yellow: #f5d000;
      --yellow-dark: #d4a800;
      --white: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7080;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #f0f4ff;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(245,208,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, rgba(26,95,168,0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(91,155,213,0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 0;
    }

    /* Clock */
    #clock {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      letter-spacing: -3px;
      color: var(--blue);
      line-height: 1;
      margin-bottom: 0.3rem;
      animation: fadeUp 0.6s ease both;
    }

    #date-label {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2.8rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 2rem;
      animation: fadeUp 0.6s 0.2s ease both;
      cursor: default;
      user-select: none;
    }

    .logo-text {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
    }

    .logo-text span:nth-child(1) { color: #1a5fa8; }
    .logo-text span:nth-child(2) { color: #e8a000; }
    .logo-text span:nth-child(3) { color: #1a5fa8; }
    .logo-text span:nth-child(4) { color: #34a853; }
    .logo-text span:nth-child(5) { color: #1a5fa8; }
    .logo-text span:nth-child(6) { color: #ea4335; }
    .logo-text span:nth-child(7) { color: #e8a000; }
    .logo-text span:nth-child(8) { color: #1a5fa8; }

    .logo-badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--blue);
      padding: 3px 8px;
      border-radius: 20px;
      margin-left: 12px;
      align-self: flex-start;
      margin-top: 8px;
    }

    /* Search bar */
    .search-container {
      width: 100%;
      max-width: 600px;
      animation: fadeUp 0.6s 0.3s ease both;
      margin-bottom: 1.6rem;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--white);
      border: 2px solid transparent;
      border-radius: 50px;
      padding: 0 20px;
      gap: 12px;
      height: 56px;
      box-shadow: 0 4px 24px rgba(26,95,168,0.13), 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--blue-light);
      box-shadow: 0 4px 32px rgba(26,95,168,0.22), 0 1px 4px rgba(0,0,0,0.06);
    }

    .search-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      color: var(--muted);
    }

    #search-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: transparent;
    }

    #search-input::placeholder { color: #b0b8cc; }

    .search-btn {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
      border: none;
      border-radius: 50px;
      padding: 8px 22px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.9; transform: scale(1.03); }
    .search-btn:active { transform: scale(0.98); }

    .lucky-btn {
      background: linear-gradient(135deg, var(--yellow-dark) 0%, var(--yellow) 100%);
      color: var(--text);
    }

    /* Search buttons row */
    .search-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      animation: fadeUp 0.6s 0.4s ease both;
      margin-bottom: 3rem;
    }

    /* Quick links */
    .shortcuts {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s;
    }

    .shortcut:hover { transform: translateY(-4px); }

    .shortcut-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: var(--white);
      box-shadow: 0 2px 12px rgba(26,95,168,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      transition: box-shadow 0.18s;
    }

    .shortcut:hover .shortcut-icon {
      box-shadow: 0 6px 20px rgba(26,95,168,0.18);
    }

    .shortcut-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 0.78rem;
      color: #b0b8cc;
      letter-spacing: 0.04em;
      animation: fadeUp 0.6s 0.6s ease both;
    }

    .footer span { color: var(--blue-light); font-weight: 500; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Decorative orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }
    .orb-1 {
      width: 340px; height: 340px;
      top: -100px; right: -80px;
      background: radial-gradient(circle, rgba(26,95,168,0.18), transparent 70%);
    }
    .orb-2 {
      width: 280px; height: 280px;
      bottom: -60px; left: -60px;
      background: radial-gradient(circle, rgba(245,208,0,0.22), transparent 70%);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page">

    <div id="clock">00:00</div>
    <div id="date-label">Wednesday</div>

    <div class="logo-wrap">
      <div class="logo-text">
        <span>P</span><span>o</span><span>t</span><span>u</span><span>z</span><span>h</span><span>n</span><span>o</span>
      </div>
      <div class="logo-badge">Browser</div>
    </div>

    <div class="search-container">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search the web or enter a URL..." autocomplete="off" />
      </div>
    </div>

    <div class="search-btns">
      <button class="search-btn" onclick="doSearch()">Potuzhno Search</button>
      <button class="search-btn lucky-btn" onclick="doLucky()">I'm Feeling Lucky</button>
    </div>

    <div class="shortcuts">
      <a class="shortcut" href="https://youtube.com">
        <div class="shortcut-icon">▶️</div>
        <span class="shortcut-label">YouTube</span>
      </a>
      <a class="shortcut" href="https://github.com">
        <div class="shortcut-icon">🐙</div>
        <span class="shortcut-label">GitHub</span>
      </a>
      <a class="shortcut" href="https://gmail.com">
        <div class="shortcut-icon">✉️</div>
        <span class="shortcut-label">Gmail</span>
      </a>
      <a class="shortcut" href="https://twitter.com">
        <div class="shortcut-icon">🐦</div>
        <span class="shortcut-label">Twitter</span>
      </a>
      <a class="shortcut" href="https://reddit.com">
        <div class="shortcut-icon">🟠</div>
        <span class="shortcut-label">Reddit</span>
      </a>
      <a class="shortcut" href="https://stackoverflow.com">
        <div class="shortcut-icon">💻</div>
        <span class="shortcut-label">Stack Overflow</span>
      </a>
    </div>

  </div>

  <div class="footer">Powered by <span>Potuzhno Browser</span> &mdash; Your web, your way.</div>

  <script>
    // Clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = h + ':' + m;

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('date-label').textContent =
        days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Search
    function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      if (q.startsWith('http://') || q.startsWith('https://') || (q.includes('.') && !q.includes(' '))) {
        window.location.href = q.startsWith('http') ? q : 'https://' + q;
      } else {
        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
      }
    }

    function doLucky() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q) + '&btnI=1';
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    window.addEventListener('load', () => {
      document.getElementById('search-input').focus();
    });
  </script>
</body>
</html>
