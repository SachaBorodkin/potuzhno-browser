<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potuzhno Browser — New Tab</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
      }

      body {
        background: radial-gradient(
            ellipse at 20% 80%,
            rgba(245, 208, 0, 0.28) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 10%,
            rgba(26, 95, 168, 0.22) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(91, 155, 213, 0.12) 0%,
            transparent 70%
          ),
          linear-gradient(
            160deg,
            #ddeeff 0%,
            #c8dffa 30%,
            #f0e8b0 70%,
            #f5e060 100%
          );
      }

      /* Decorative orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
      }
      .orb-1 {
        width: 420px;
        height: 420px;
        top: -120px;
        right: -100px;
        background: radial-gradient(
          circle,
          rgba(26, 95, 168, 0.16),
          transparent 70%
        );
      }
      .orb-2 {
        width: 340px;
        height: 340px;
        bottom: -80px;
        left: -80px;
        background: radial-gradient(
          circle,
          rgba(245, 208, 0, 0.26),
          transparent 70%
        );
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }

      /* Search bar */
      .search-container {
        width: 100%;
        height: 100%;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .search-box {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.93);
        border: none;
        border-radius: 50px;
        padding: 0 36px;
        gap: 16px;
        height: 100px;
        width: 90%;
        max-width: 1400px;
        box-shadow: 0 10px 40px rgba(26, 95, 168, 0.2);
        transition: all 0.3s ease;
      }
      .search-box:focus-within {
        background: rgba(255, 255, 255, 0.99);
        box-shadow: 0 16px 56px rgba(26, 95, 168, 0.35);
        transform: scale(1.01);
      }

      .search-icon {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        color: #8a9ab8;
      }

      #search-input {
        flex: 1;
        border: none;
        outline: none;
        font-family: "DM Sans", sans-serif;
        font-size: 1.8rem;
        color: #1a2a4a;
        background: transparent;
      }
      #search-input::placeholder {
        color: #c0cce0;
      }

      /* Footer */
      .footer {
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        font-size: 0.75rem;
        color: #7a8db8;
        text-align: center;
        letter-spacing: 0.04em;
      }
      .footer span {
        color: #5b9bd5;
        font-weight: 500;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="page">
      <div class="search-container">
        <div class="search-box">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            id="search-input"
            type="text"
            placeholder="Search the web or enter a URL..."
            autocomplete="off"
          />
        </div>
      </div>
    </div>

    <div class="footer">
      Powered by <span>Potuzhno Browser</span> &mdash; Your web, your way.
    </div>

    <script>
      // Search
      function doSearch() {
        const q = document.getElementById("search-input").value.trim();
        if (!q) return;
        if (/^(https?:\/\/)/.test(q)) {
          window.location.href = q;
          return;
        }
        if (
          /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}(\/.*)?$/.test(q) &&
          !q.includes(" ")
        ) {
          window.location.href = "https://" + q;
          return;
        }
        window.location.href =
          "https://www.google.com/search?q=" + encodeURIComponent(q);
      }

      document
        .getElementById("search-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") doSearch();
        });

      window.addEventListener("load", () => {
        document.getElementById("search-input").focus();
      });
    </script>
  </body>
</html>
